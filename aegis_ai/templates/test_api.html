<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>aegis.ai - Test</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        textarea { width: 100%; height: 150px; }
        input { width: 100%; padding: 10px; margin: 10px 0; }
        button { padding: 12px 25px; background: #1a73e8; color: white; border: none; font-size: 16px; }
        pre { background: #222; color: #0f0; padding: 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🚀 aegis.ai Phishing Detection Tester</h1>
    
    <textarea id="email_text" rows="6">Dear customer, your account has been suspended. Please verify immediately: https://secure-bank-login-update.com/verify</textarea><br><br>
    
    <input type="text" id="sender_email" value="alert@bank-security.com" placeholder="Sender Email"><br><br>
    <input type="text" id="sender_name" value="Bank of America Support" placeholder="Sender Name"><br><br>
    
    <button onclick="testDetection()">🚀 Run Detection</button>

    <h2>Result:</h2>
    <pre id="result">Click the button to test...</pre>

    <script>
        async function testDetection() {
            const payload = {
                email_text: document.getElementById('email_text').value,
                sender_email: document.getElementById('sender_email').value,
                sender_name: document.getElementById('sender_name').value
            };

            const res = await fetch('/api/detect/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
