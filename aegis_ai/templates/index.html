<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis.ai - Next-Gen Phishing Detection</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #02043b;
            --primary-accent: #00f0ff;
            --secondary-accent: #00ff9d; /* Changed from Pink to Electric Green */
            --text-light: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.7);
            --glass-bg: rgba(10, 15, 80, 0.6);
            --glass-border: rgba(0, 240, 255, 0.2);
            --gradient-accent: linear-gradient(90deg, #00f0ff, #00ff9d);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            opacity: 0.2;
        }

        h1, h2, h3, h4 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 4rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            background: rgba(2, 4, 59, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-size: 1.8rem;
            color: var(--primary-accent);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
            text-decoration: none;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            margin-left: 2.5rem;
            font-weight: 500;
            transition: color 0.3s;
            font-size: 0.95rem;
        }

        .nav-links a:hover {
            color: var(--secondary-accent);
        }

        /* Hero */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 8rem 4rem 4rem;
            position: relative;
        }

        .hero-content {
            flex: 1;
            max-width: 650px;
            z-index: 2;
        }

        .tagline {
            color: var(--secondary-accent);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: block;
        }

        .hero-title {
            font-size: 4rem;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.15rem;
            color: var(--text-dim);
            margin-bottom: 2.5rem;
            max-width: 90%;
        }

        .btn {
            padding: 1rem 2.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: transparent;
            color: var(--primary-accent);
            border: 2px solid var(--primary-accent);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .btn-primary:hover {
            background: var(--primary-accent);
            color: var(--bg-color);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
        }

        .hero-3d-container {
            flex: 1;
            height: 600px;
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Platform Architecture / Detailed Setup */
        .architecture {
            padding: 6rem 4rem;
            background: linear-gradient(180deg, rgba(2,4,59,0) 0%, rgba(0,240,255,0.03) 50%, rgba(2,4,59,0) 100%);
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-title {
            font-size: 2.8rem;
            margin-bottom: 1rem;
            color: var(--text-light);
        }

        .section-subtitle {
            color: var(--secondary-accent);
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
        }

        .pipeline-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .pipeline-step {
            flex: 1;
            min-width: 250px;
            padding: 2.5rem 2rem;
            text-align: center;
            border-top: 3px solid transparent;
            transition: all 0.4s ease;
        }

        .pipeline-step:hover {
            border-top-color: var(--secondary-accent);
            background: rgba(0, 255, 157, 0.05);
            transform: translateY(-5px);
        }

        .step-icon {
            font-size: 2rem;
            font-weight: 800;
            color: var(--bg-color);
            background: var(--primary-accent);
            width: 60px;
            height: 60px;
            line-height: 60px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            font-family: 'Orbitron', sans-serif;
        }

        .step-title {
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: var(--primary-accent);
        }

        .step-desc {
            font-size: 0.95rem;
            color: var(--text-dim);
            line-height: 1.7;
        }

        /* Features Grid */
        .features {
            padding: 6rem 4rem;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
        }

        .feature-card {
            padding: 2.5rem;
            border-radius: 16px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
            border-left: 4px solid var(--primary-accent);
        }

        .feature-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 45px rgba(0, 255, 157, 0.15);
            border-left-color: var(--secondary-accent);
        }

        .feature-svg-container {
            margin-bottom: 1.5rem;
        }

        .feature-title {
            font-size: 1.6rem;
            margin-bottom: 1rem;
            color: var(--text-light);
        }

        .feature-list {
            list-style: none;
            margin-top: 1.5rem;
        }

        .feature-list li {
            margin-bottom: 0.8rem;
            color: var(--text-dim);
            font-size: 0.95rem;
            display: flex;
            align-items: flex-start;
        }

        .feature-list li::before {
            content: "✓";
            color: var(--secondary-accent);
            margin-right: 10px;
            font-weight: bold;
        }

        /* Footer Overlay */
        footer {
            background: rgba(1, 2, 25, 0.95);
            border-top: 1px solid var(--glass-border);
            padding: 5rem 4rem 2rem;
            position: relative;
            z-index: 10;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 4rem;
            margin-bottom: 4rem;
        }

        .footer-brand h3 {
            color: var(--primary-accent);
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .footer-brand p {
            color: var(--text-dim);
            font-size: 0.9rem;
            max-width: 300px;
            line-height: 1.8;
        }

        .footer-col h4 {
            color: var(--text-light);
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }

        .footer-col ul {
            list-style: none;
        }

        .footer-col ul li {
            margin-bottom: 0.8rem;
        }

        .footer-col ul li a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .footer-col ul li a:hover {
            color: var(--secondary-accent);
        }

        .footer-bottom {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .social-links a {
            color: rgba(255, 255, 255, 0.4);
            margin-left: 1rem;
            text-decoration: none;
            transition: color 0.3s;
        }

        .social-links a:hover {
            color: var(--primary-accent);
        }

        /* SVG styles */
        .icon-svg {
            width: 42px;
            height: 42px;
            stroke: var(--primary-accent);
            stroke-width: 1.5;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @media (max-width: 1024px) {
            .hero { flex-direction: column; text-align: center; padding-top: 10rem; }
            .hero-subtitle { margin: 1.5rem auto 2.5rem; }
            .hero-3d-container { height: 400px; width: 100%; margin-top: 2rem; }
            .footer-grid { grid-template-columns: 1fr 1fr; gap: 2rem; }
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .footer-grid { grid-template-columns: 1fr; }
            .footer-bottom { flex-direction: column; gap: 1rem; }
            .pipeline-container { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useRef } = React;

        // Custom SVGs
        const Icons = {
            Mail: () => (
                <svg className="icon-svg" viewBox="0 0 24 24">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
            ),
            Link: () => (
                <svg className="icon-svg" viewBox="0 0 24 24">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                </svg>
            ),
            Activity: () => (
                <svg className="icon-svg" viewBox="0 0 24 24">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
            ),
            Brain: () => (
                <svg className="icon-svg" viewBox="0 0 24 24">
                    <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"></path>
                    <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"></path>
                    <path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"></path>
                    <path d="M17.599 6.5A3 3 0 0 0 13.6 4"></path>
                    <path d="M6.401 6.5A3 3 0 0 1 10.4 4"></path>
                </svg>
            )
        };

        const Navbar = () => (
            <nav>
                <a href="#" className="logo">Aegis.ai</a>
                <div className="nav-links">
                    <a href="#how-it-works">How It Works</a>
                    <a href="#capabilities">Capabilities</a>
                    <a href="#documentation">API Specs</a>
                </div>
            </nav>
        );

        const Hero = () => {
            const mountRef = useRef(null);

            useEffect(() => {
                const currentMount = mountRef.current;
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, currentMount.clientWidth / currentMount.clientHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                
                renderer.setSize(currentMount.clientWidth, currentMount.clientHeight);
                currentMount.appendChild(renderer.domElement);

                // Main Globe representation
                const geometry = new THREE.IcosahedronGeometry(2, 3);
                const material = new THREE.MeshBasicMaterial({ 
                    color: 0x00f0ff, 
                    wireframe: true,
                    transparent: true,
                    opacity: 0.2
                });
                const sphere = new THREE.Mesh(geometry, material);
                scene.add(sphere);

                // Core energy sphere inside
                const coreGeo = new THREE.IcosahedronGeometry(1.2, 2);
                const coreMat = new THREE.MeshBasicMaterial({
                    color: 0x00ff9d, // Changed to match electric green
                    wireframe: true,
                    transparent: true,
                    opacity: 0.5
                });
                const core = new THREE.Mesh(coreGeo, coreMat);
                scene.add(core);

                // Particles
                const particlesGeometry = new THREE.BufferGeometry();
                const particlesCount = 800;
                const posArray = new Float32Array(particlesCount * 3);

                for(let i = 0; i < particlesCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 6;
                }
                
                particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                const particlesMaterial = new THREE.PointsMaterial({
                    size: 0.02,
                    color: 0x00ff9d, // Green particles
                    transparent: true,
                    opacity: 0.8
                });
                
                const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
                scene.add(particlesMesh);

                camera.position.z = 4.5;

                const animate = function () {
                    requestAnimationFrame(animate);
                    sphere.rotation.x += 0.001;
                    sphere.rotation.y += 0.002;
                    core.rotation.x -= 0.002;
                    core.rotation.y -= 0.003;
                    particlesMesh.rotation.y -= 0.001;
                    renderer.render(scene, camera);
                };
                animate();

                const handleResize = () => {
                    camera.aspect = currentMount.clientWidth / currentMount.clientHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(currentMount.clientWidth, currentMount.clientHeight);
                }
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    currentMount.removeChild(renderer.domElement);
                };
            }, []);

            return (
                <section className="hero">
                    <div className="hero-content">
                        <span className="tagline">Enterprise-Grade Defence</span>
                        <h1 className="hero-title">Zero-Day Intelligence Phishing Engine</h1>
                        <p className="hero-subtitle">
                            We don't rely on blocklists. Aegis.ai utilizes multi-vector risk scoring, NLP sentiment analysis, and deep sandbox inspection to halt novel and AI-generated attacks inside your perimeter.
                        </p>
                        <a href="#how-it-works" className="btn btn-primary">Discover the Engine</a>
                    </div>
                    <div className="hero-3d-container" ref={mountRef}></div>
                </section>
            );
        };

        const Architecture = () => {
            const steps = [
                { id: "1", title: "Content Ingestion", desc: "Incoming data is aggressively parsed. Emails, Slack messages, and embedded URLs are stripped, normalized, and prepared for analysis." },
                { id: "2", title: "Machine Learning Triage", desc: "Our BERT-based NLP models perform semantic extraction, identifying subtle manipulations, urgency triggers, and LLM-generated fingerprints." },
                { id: "3", title: "Dynamic Sandbox", desc: "Suspicious attachments and redirect chains execute inside an isolated container. File system hooks monitor for malicious macros operations." },
                { id: "4", title: "Threat Convergence", desc: "Risk signals from content, behavior, and context converge. A unified confidence score determines mitigation and payload quarantine." }
            ];

            return (
                <section id="how-it-works" className="architecture">
                    <div className="section-header">
                        <h2 className="section-title">The Detection Pipeline</h2>
                        <p className="section-subtitle">How Aegis.ai deconstructs an attack in milliseconds.</p>
                    </div>
                    <div className="pipeline-container">
                        {steps.map(step => (
                            <div key={step.id} className="pipeline-step glass-panel">
                                <div className="step-icon">{step.id}</div>
                                <h3 className="step-title">{step.title}</h3>
                                <p className="step-desc">{step.desc}</p>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        const Features = () => {
            const features = [
                {
                    title: "Advanced NLP Dissection",
                    Icon: Icons.Mail,
                    items: [
                        "Identifies LLM-written phishing attempts.",
                        "Flagging urgency syntax & credential requests.",
                        "Sender domain spoofing & Header matching."
                    ]
                },
                {
                    title: "URL Threat Matrix",
                    Icon: Icons.Link,
                    items: [
                        "Typo-squatting mathematical analysis.",
                        "Live redirection chain mapping.",
                        "Zero-day phishing domain age scoring."
                    ]
                },
                {
                    title: "Explainable Risk Scoring",
                    Icon: Icons.Brain,
                    items: [
                        "We trace the 'Why' behind every block.",
                        "Aggregate low/med/high risk metrics.",
                        "Contextual insights for SecOps teams."
                    ]
                },
                {
                    title: "Behavioral Monitoring",
                    Icon: Icons.Activity,
                    items: [
                        "Track multi-stage lateral flows.",
                        "Detect email -> link -> payload progression.",
                        "Identify campaign-level network clusters."
                    ]
                }
            ];

            return (
                <section id="capabilities" className="features">
                    <div className="section-header">
                        <h2 className="section-title">Core Intelligence Capabilities</h2>
                        <p className="section-subtitle">Beyond static rules. Adapting to how attacks evolve.</p>
                    </div>
                    <div className="features-grid">
                        {features.map((feature, idx) => (
                            <div key={idx} className="feature-card glass-panel">
                                <div className="feature-svg-container"><feature.Icon /></div>
                                <h3 className="feature-title">{feature.title}</h3>
                                <ul className="feature-list">
                                    {feature.items.map((item, i) => (
                                        <li key={i}>{item}</li>
                                    ))}
                                </ul>
                            </div>
                        ))}
                    </div>
                </section>
            );
        };

        const Footer = () => (
            <footer>
                <div className="footer-grid">
                    <div className="footer-brand">
                        <h3>Aegis.ai</h3>
                        <p>Securing the future of digital communication with adaptive, explainable, and multi-vector threat prevention solutions.</p>
                    </div>
                    <div className="footer-col">
                        <h4>Platform</h4>
                        <ul>
                            <li><a href="#how-it-works">Pipeline Architecture</a></li>
                            <li><a href="#capabilities">Threat Intelligence</a></li>
                            <li><a href="#demo">Live Test Engine</a></li>
                            <li><a href="#">Enterprise Sandbox</a></li>
                        </ul>
                    </div>
                    <div className="footer-col">
                        <h4>Resources</h4>
                        <ul>
                            <li><a href="#">API Documentation</a></li>
                            <li><a href="#">Integration Guides</a></li>
                            <li><a href="#">Case Studies</a></li>
                            <li><a href="#">Threat Metrics Hub</a></li>
                        </ul>
                    </div>
                    <div className="footer-col">
                        <h4>Company</h4>
                        <ul>
                            <li><a href="#">About Us</a></li>
                            <li><a href="#">Security Research</a></li>
                            <li><a href="#">Careers</a></li>
                            <li><a href="#">Contact SOC</a></li>
                        </ul>
                    </div>
                </div>
                <div className="footer-bottom">
                    <p>&copy; 2026 Aegis.ai Security Architecture. All rights reserved.</p>
                    <div className="social-links">
                        <a href="#">Twitter</a>
                        <a href="#">LinkedIn</a>
                        <a href="#">GitHub</a>
                    </div>
                </div>
            </footer>
        );

        const App = () => {
            useEffect(() => {
                const canvas = document.createElement('canvas');
                canvas.id = 'bg-canvas';
                document.body.prepend(canvas);
                
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;

                const particlesArray = [];
                const numberOfParticles = 80;

                class Particle {
                    constructor() {
                        this.x = Math.random() * canvas.width;
                        this.y = Math.random() * canvas.height;
                        this.size = Math.random() * 1.5;
                        this.speedX = (Math.random() - 0.5) * 0.4;
                        this.speedY = (Math.random() - 0.5) * 0.4;
                    }
                    update() {
                        this.x += this.speedX;
                        this.y += this.speedY;
                        if (this.x > canvas.width) this.x = 0;
                        if (this.x < 0) this.x = canvas.width;
                        if (this.y > canvas.height) this.y = 0;
                        if (this.y < 0) this.y = canvas.height;
                    }
                    draw() {
                        ctx.fillStyle = 'rgba(0, 255, 157, 0.4)'; // Electric green
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                for (let i = 0; i < numberOfParticles; i++) {
                    particlesArray.push(new Particle());
                }

                function animate() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    for (let i = 0; i < particlesArray.length; i++) {
                        particlesArray[i].update();
                        particlesArray[i].draw();
                    }
                    requestAnimationFrame(animate);
                }
                animate();

                window.addEventListener('resize', () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                });

                return () => {
                    document.body.removeChild(canvas);
                };
            }, []);

            return (
                <div>
                    <Navbar />
                    <Hero />
                    <Architecture />
                    <Features />
                    <Footer />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
